<div>
  <main
    class="min-h-screen font-sans bg-slate-100 text-slate-900 selection:bg-cyan-500/30 flex flex-col"
  >
    <!-- Fixed Header -->
    <app-header></app-header>

    <!-- Header Spacer (Height of header) -->
    <div class="h-16.25 w-full"></div>

    <div
      class="max-w-350 mx-auto p-4 md:p-10 flex flex-col lg:grid lg:grid-cols-12 gap-8 md:gap-12 relative items-start grow w-full"
    >
      <!-- Left Column: Navigation -->
      <aside
        class="sticky top-[63px] z-50 w-full lg:top-25 lg:col-span-3 lg:self-start lg:z-auto bg-slate-100/90 backdrop-blur-md lg:-mx-4 py-4 border-b border-slate-200 lg:bg-transparent lg:backdrop-blur-none lg:border-none lg:p-0"
      >
        <app-spot-selector
          [spots]="spots"
          [selectedId]="selectedSpotId()"
          [isLoading]="isLoading()"
          (spotChange)="onSpotChange($event)"
        ></app-spot-selector>
      </aside>

      <!-- Main Column -->
      <div class="lg:col-span-9 space-y-8 w-full">
        @if (hasError()) {
          <!-- Error Placeholder -->
          <div
            class="bg-white border-2 border-red-100 p-10 md:p-16 rounded-2xl shadow-xl shadow-red-100/50 flex flex-col items-center text-center space-y-8"
          >
            <div
              class="h-20 w-20 bg-red-50 rounded-full flex items-center justify-center text-red-500"
            >
              <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                />
              </svg>
            </div>
            <div>
              <h2 class="text-2xl font-black tracking-tight text-slate-900">
                {{ i18n.t().error.title }}
              </h2>
              <p class="text-sm font-bold text-slate-400 mt-3">{{ i18n.t().error.message }}</p>
            </div>
            <button
              (click)="retryFetch()"
              class="px-8 py-3.5 bg-slate-900 hover:bg-cyan-600 text-white rounded-xl font-black uppercase tracking-widest transition-all shadow-lg"
            >
              {{ i18n.t().error.retry }}
            </button>
          </div>
        } @else {
          <!-- Metrics Grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <app-metric-card
              [title]="i18n.t().metrics.peakPrediction"
              [value]="forecast().length ? maxWaveHeight24h() : '...'"
              [unit]="i18n.t().metrics.meters"
              [description]="i18n.t().metrics.peakDesc"
              [statusColor]="sessionStatus().color"
            ></app-metric-card>

            <app-metric-card
              [title]="i18n.t().metrics.sessionQuality"
              [statusLabel]="sessionStatus().label"
              [description]="sessionStatus().desc"
              [statusColor]="sessionStatus().color"
            ></app-metric-card>

            <app-metric-card
              [title]="i18n.t().metrics.windTitle"
              [value]="currentWind().speed"
              unit="km/h"
              [description]="i18n.t().metrics.windDesc"
              [isWindCard]="true"
              [windDirection]="currentWind().direction"
            ></app-metric-card>
          </div>

          <!-- Secondary Info Row -->
          <div
            class="flex flex-col sm:flex-row items-center justify-between p-4 bg-white/50 border-2 border-slate-200 rounded-xl shadow-sm gap-4"
          >
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-2">
                <div class="h-2 w-2 rounded-full bg-cyan-500 animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500"
                  >{{ i18n.t().metrics.stationStatus }}:</span
                >
                <span class="text-[10px] font-black uppercase tracking-widest text-cyan-700">{{
                  i18n.t().metrics.syncActive
                }}</span>
              </div>
              <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>
              <p class="text-[10px] font-bold text-slate-400 hidden sm:block">
                {{ i18n.t().metrics.telemetryDesc }}
              </p>
            </div>
          </div>

          <!-- Main Visualization -->
          <app-forecast-chart
            [forecast]="forecast()"
            [isLoading]="isLoading()"
          ></app-forecast-chart>
        }
      </div>
    </div>

    <!-- Minimalist Footer -->
    <footer class="w-full bg-slate-100 py-12 border-t border-slate-200">
      <div class="max-w-350 mx-auto px-8 flex items-center justify-center">
        <div class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">
          {{ i18n.t().footer.copyright }}
        </div>
      </div>
    </footer>
  </main>
</div>
