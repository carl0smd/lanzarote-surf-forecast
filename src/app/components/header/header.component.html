<div
  class="bg-white/80 backdrop-blur-xl border-b border-slate-200 fixed top-0 left-0 right-0 z-100 w-full h-16.25 flex items-center"
>
  <div class="max-w-350 mx-auto px-4 md:px-10 w-full flex items-center justify-between gap-3">
    <div class="flex items-center gap-2 md:gap-4 min-w-0">
      <div
        class="h-8 w-8 md:h-10 md:w-10 bg-white rounded-xl flex items-center justify-center shadow-lg shadow-slate-200/50 overflow-hidden border border-slate-100 shrink-0"
      >
        <img src="/images/apple-touch-icon.png" alt="Logo" class="w-6 h-6 md:w-8 md:h-8 object-contain" />
      </div>
      <h1 class="text-sm xs:text-base sm:text-lg md:text-2xl font-black tracking-tighter leading-none min-w-0">
        {{ i18n.t().header.title }}
        <span class="text-cyan-600">{{ i18n.t().header.subtitle }}</span>
      </h1>
    </div>

    <!-- Language Toggle -->
    <button
      (click)="i18n.toggleLanguage()"
      class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 bg-white hover:border-cyan-600 transition-all text-[10px] font-black uppercase tracking-widest shadow-sm"
    >
      <span [class.text-cyan-600]="i18n.currentLang() === 'es'">ES</span>
      <span class="text-slate-300">|</span>
      <span [class.text-cyan-600]="i18n.currentLang() === 'en'">EN</span>
    </button>
  </div>
</div>
