<div
  class="bg-white border-2 border-slate-200 p-6 md:p-10 rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden"
>
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
    <div class="space-y-1">
      <h3 class="text-2xl font-black tracking-tighter">{{ i18n.t().chart.title }}</h3>
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
        {{ i18n.t().chart.subtitle }}
      </p>
    </div>
    <div class="flex flex-wrap gap-2">
      <div
        class="px-4 py-1.5 rounded-lg bg-slate-100 border border-slate-200 text-[10px] font-black uppercase tracking-widest text-slate-500 flex items-center h-8"
      >
        {{ i18n.t().nav.timezone }}
      </div>
      <div
        class="px-4 py-1.5 rounded-lg bg-slate-950 text-white text-[10px] font-black uppercase tracking-widest shadow-lg shadow-black/20 flex items-center h-8"
      >
        {{ i18n.t().nav.realtime }}
      </div>
    </div>
  </div>

  <div class="h-87.5 md:h-112.5 w-full relative">
    @if (isLoading()) {
      <div
        class="absolute inset-0 flex flex-col items-center justify-center gap-6 bg-white/50 backdrop-blur-sm rounded-xl z-10"
      >
        <div class="w-16 h-1 bg-slate-200 rounded-full overflow-hidden">
          <div class="h-full bg-cyan-600 w-1/3 animate-[loading_1s_infinite]"></div>
        </div>
        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400 animate-pulse">
          Satellite Link Active
        </p>
      </div>
    }

    @if (forecast().length > 0) {
      <canvas baseChart [data]="chartData()" [options]="chartOptions()" [type]="lineChartType">
      </canvas>
    }
  </div>

  <div class="mt-8 flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
    <div class="p-1.5 bg-cyan-600/10 rounded-md text-cyan-600">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
    </div>
    <p class="text-[10px] font-bold text-slate-400">
      {{ i18n.t().chart.footerInfo }}
    </p>
  </div>
</div>
